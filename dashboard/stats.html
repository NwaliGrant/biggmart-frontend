<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats - The BiggMart Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="dashboard-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.png" alt="The BiggMart" class="sidebar-logo">
        <span>The BiggMart</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="products.html" class="nav-item"><i class="fas fa-boxes"></i> Products</a>
        <a href="hero.html" class="nav-item"><i class="fas fa-images"></i> Hero Images</a>
        <a href="testimonials.html" class="nav-item"><i class="fas fa-star"></i> Testimonials</a>
        <a href="stats.html" class="nav-item active"><i class="fas fa-chart-bar"></i> Stats</a>
        <a href="#" class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h2>Statistics</h2>
        <div class="header-user">
          <span>Welcome, <strong id="adminName">Admin</strong></span>
          <i class="fas fa-user-circle"></i>
        </div>
      </header>

      <div class="stats-edit-grid">
        <div class="stat-edit-card">
          <h3><i class="fas fa-users" style="color: #1e4a76;"></i> Happy Customers</h3>
          <div class="stat-edit-control">
            <input type="number" id="editCustomers" value="15000">
            <button class="btn btn-sm btn-primary" onclick="updateStat('total_customers', 'editCustomers')">Update</button>
          </div>
        </div>

        <div class="stat-edit-card">
          <h3><i class="fas fa-box" style="color: #2e7d32;"></i> Total Products</h3>
          <div class="stat-edit-control">
            <input type="number" id="editProducts" value="500">
            <button class="btn btn-sm btn-primary" onclick="updateStat('total_products', 'editProducts')">Update</button>
          </div>
        </div>

        <div class="stat-edit-card">
          <h3><i class="fas fa-city" style="color: #f57c00;"></i> Cities Covered</h3>
          <div class="stat-edit-control">
            <input type="number" id="editCities" value="50">
            <button class="btn btn-sm btn-primary" onclick="updateStat('total_cities', 'editCities')">Update</button>
          </div>
        </div>

        <div class="stat-edit-card">
          <h3><i class="fas fa-truck" style="color: #7b1fa2;"></i> On-Time Delivery (%)</h3>
          <div class="stat-edit-control">
            <input type="number" id="editDelivery" value="98" min="0" max="100">
            <button class="btn btn-sm btn-primary" onclick="updateStat('on_time_delivery', 'editDelivery')">Update</button>
          </div>
        </div>
      </div>

      <div style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 12px;">
        <p style="color: #94a3b8; font-size: 0.9rem;">
          <i class="fas fa-info-circle"></i> These stats are displayed on the public website counters.
          Update them to reflect your current business numbers.
        </p>
      </div>
    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
