<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials - The BiggMart Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="dashboard-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.png" alt="The BiggMart" class="sidebar-logo">
        <span>The BiggMart</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="products.html" class="nav-item"><i class="fas fa-boxes"></i> Products</a>
        <a href="hero.html" class="nav-item"><i class="fas fa-images"></i> Hero Images</a>
        <a href="testimonials.html" class="nav-item active"><i class="fas fa-star"></i> Testimonials</a>
        <a href="stats.html" class="nav-item"><i class="fas fa-chart-bar"></i> Stats</a>
        <a href="#" class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h2>Testimonials</h2>
        <div class="header-user">
          <span>Welcome, <strong id="adminName">Admin</strong></span>
          <i class="fas fa-user-circle"></i>
        </div>
      </header>

      <div class="page-actions">
        <button class="btn btn-primary" id="addTestimonialBtn">
          <i class="fas fa-plus"></i> Add Testimonial
        </button>
      </div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Review</th>
              <th>Rating</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="testimonialsTableBody">
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px; color: #94a3b8;">
                <i class="fas fa-spinner fa-spin"></i> Loading testimonials...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Testimonial Modal -->
  <div id="testimonialModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="testimonialModalTitle">Add Testimonial</h3>
        <button class="modal-close" id="closeTestimonialModal">&times;</button>
      </div>
      <form id="testimonialForm">
        <input type="hidden" id="testimonialId">
        <div class="form-group">
          <label>Customer Name *</label>
          <input type="text" id="testimonialName" required>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="testimonialLocation" placeholder="e.g., Lagos, Nigeria">
        </div>
        <div class="form-group">
          <label>Review *</label>
          <textarea id="testimonialContent" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label>Rating</label>
          <select id="testimonialRating">
            <option value="5">⭐⭐⭐⭐⭐ (5)</option>
            <option value="4">⭐⭐⭐⭐ (4)</option>
            <option value="3">⭐⭐⭐ (3)</option>
            <option value="2">⭐⭐ (2)</option>
            <option value="1">⭐ (1)</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelTestimonialModal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
