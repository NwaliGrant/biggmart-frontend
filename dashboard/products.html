<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - The BiggMart Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.png" alt="The BiggMart" class="sidebar-logo">
        <span>The BiggMart</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="products.html" class="nav-item active"><i class="fas fa-boxes"></i> Products</a>
        <a href="hero.html" class="nav-item"><i class="fas fa-images"></i> Hero Images</a>
        <a href="testimonials.html" class="nav-item"><i class="fas fa-star"></i> Testimonials</a>
        <a href="stats.html" class="nav-item"><i class="fas fa-chart-bar"></i> Stats</a>
        <a href="#" class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h2>Product Management</h2>
        <div class="header-user">
          <span>Welcome, <strong id="adminName">Admin</strong></span>
          <i class="fas fa-user-circle"></i>
        </div>
      </header>

      <!-- Actions -->
      <div class="page-actions">
        <button class="btn btn-primary" id="addProductBtn">
          <i class="fas fa-plus"></i> Add New Product
        </button>
        <div class="search-box">
          <input type="text" id="searchProducts" placeholder="Search products...">
          <i class="fas fa-search"></i>
        </div>
      </div>

      <!-- Products Table -->
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Product Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr>
              <td colspan="6" style="text-align: center; padding: 40px; color: #94a3b8;">
                <i class="fas fa-spinner fa-spin"></i> Loading products...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div id="productModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="productModalTitle">Add New Product</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="productForm" enctype="multipart/form-data">
        <input type="hidden" id="productId">
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="productName" required>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="productCategory" required>
            <option value="gadgets">Gadgets</option>
            <option value="electronics">Electronics</option>
            <option value="home">Home Essentials</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price (₦) *</label>
          <input type="number" id="productPrice" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="productDescription" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="productStatus">
            <option value="false">In Stock</option>
            <option value="true">Sold Out</option>
          </select>
        </div>
        <div class="form-group">
          <label>Product Image</label>
          <input type="file" id="productImage" accept="image/*">
          <div id="currentImagePreview" style="margin-top: 10px;"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelModal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
