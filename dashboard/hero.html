<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Images - The BiggMart Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="dashboard-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.png" alt="The BiggMart" class="sidebar-logo">
        <span>The BiggMart</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="products.html" class="nav-item"><i class="fas fa-boxes"></i> Products</a>
        <a href="hero.html" class="nav-item active"><i class="fas fa-images"></i> Hero Images</a>
        <a href="testimonials.html" class="nav-item"><i class="fas fa-star"></i> Testimonials</a>
        <a href="stats.html" class="nav-item"><i class="fas fa-chart-bar"></i> Stats</a>
        <a href="#" class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h2>Hero Images</h2>
        <div class="header-user">
          <span>Welcome, <strong id="adminName">Admin</strong></span>
          <i class="fas fa-user-circle"></i>
        </div>
      </header>

      <div class="page-actions">
        <button class="btn btn-primary" id="addHeroBtn">
          <i class="fas fa-plus"></i> Add Hero Image
        </button>
        <p style="color: #94a3b8; font-size: 0.9rem;">
          <i class="fas fa-info-circle"></i> Images auto-rotate every 5 seconds on the public site
        </p>
      </div>

      <div class="hero-grid" id="heroGrid">
        <div style="text-align: center; padding: 60px; color: #94a3b8; width: 100%;">
          <i class="fas fa-spinner fa-spin"></i> Loading hero images...
        </div>
      </div>
    </main>
  </div>

  <!-- Hero Modal -->
  <div id="heroModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="heroModalTitle">Add Hero Image</h3>
        <button class="modal-close" id="closeHeroModal">&times;</button>
      </div>
      <form id="heroForm" enctype="multipart/form-data">
        <input type="hidden" id="heroId">
        <div class="form-group">
          <label>Image *</label>
          <input type="file" id="heroImage" accept="image/*" required>
          <div id="currentHeroPreview" style="margin-top: 10px;"></div>
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="heroTitle" placeholder="e.g., Summer Sale">
        </div>
        <div class="form-group">
          <label>Subtitle</label>
          <input type="text" id="heroSubtitle" placeholder="e.g., Get 20% off">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelHeroModal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
